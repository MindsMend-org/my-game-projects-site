backend:
  name: github
  repo: MindsMend-org/my-game-projects-site
  branch: master                             # Change to 'main' if your repo default branch is 'main'
  squash_merges: true                        # Cleaner commit history

media_folder: "static/img/uploads"           # Images go here
public_folder: "/img/uploads"                # How paths appear in CMS

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "docs/projects"
    create: true
    delete: true
    slug: "{{title | slugify}}"
    identifier_field: "title"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Slug (optional)", name: "slug", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Main Image", name: "image", widget: "image", allow_multiple: false, required: false }
      - { label: "Body / Overview", name: "body", widget: "markdown" }
      - label: "Levels"
        name: "levels"
        widget: "list"
        summary: "{{fields.name}} ({{fields.enemies.length || 0}} enemies)"
        collapsed: false
        fields:
          - { label: "Level Name", name: "name", widget: "string", required: true }
          - { label: "Background Image", name: "bgImage", widget: "image", required: false }
          - { label: "Foreground Image", name: "fgImage", widget: "image", required: false }
          - label: "Enemies"
            name: "enemies"
            widget: "list"
            summary: "{{fields.name}} – {{fields.type}} / {{fields.subtype}}"
            collapsed: true
            fields:
              - { label: "Type", name: "type", widget: "select", options: ["biologics", "non-biologics"], default: "biologics" }
              - { label: "Subtype", name: "subtype", widget: "select", options: ["ground", "air", "hidden"], default: "ground" }
              - { label: "Name", name: "name", widget: "string", required: true }
              - { label: "Health", name: "health", widget: "number", value_type: "int", min: 0, default: 100 }
              - { label: "Damage", name: "damage", widget: "number", value_type: "int", min: 0, default: 10 }
              - { label: "Details / Notes", name: "details", widget: "markdown" }
              - { label: "Image", name: "image", widget: "image", required: false }

  - name: "blog"
    label: "Blog"
    folder: "blog"
    create: true
    slug: "{{date}}-{{slug}}"
    identifier_field: "title"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: false
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", required: false }
      - { label: "Author Title", name: "author_title", widget: "string", required: false }
      - { label: "Author URL", name: "author_url", widget: "string", required: false }
      - { label: "Author Image", name: "author_image_url", widget: "image", allow_multiple: false, required: false }
      - { label: "Hide Table of Contents", name: "hide_table_of_contents", widget: "boolean", default: false }
      - { label: "Tags", name: "tags", widget: "list", default: [], required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", timeFormat: false }
      - { label: "Description", name: "description", required: false }
      - { label: "Image", name: "image", widget: "image", allow_multiple: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    folder: "src/pages"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    extension: "mdx"           # ← Changed to mdx (supports frontmatter + JSX/Markdown)
    format: "frontmatter"
    editor:
      preview: false
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }